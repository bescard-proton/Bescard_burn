name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.14.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build mainnet
        env:
          PUBLIC_BASE_PATH: /Bescard_burn/
        run: |
          rm -rf dist dist-mainnet
          pnpm build:mainnet
          mv dist dist-mainnet

      - name: Build testnet
        env:
          PUBLIC_BASE_PATH: /Bescard_burn/testnet/
        run: |
          rm -rf dist dist-testnet
          pnpm build:testnet
          mv dist dist-testnet

      - name: Assemble Pages artifact
        run: |
          rm -rf dist-pages
          mkdir -p dist-pages/testnet
          cp -R dist-mainnet/. dist-pages/
          cp -R dist-testnet/. dist-pages/testnet/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist-pages

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
